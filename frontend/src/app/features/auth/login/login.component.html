<div class="d-flex justify-content-center">
  <div class="card shadow-sm auth-card">
    <div class="card-body p-4">
      <h1 class="h4 fw-semibold mb-4 text-center">Connexion</h1>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched"
            formControlName="email"
          />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <div class="invalid-feedback">Email valide requis.</div>
          }
        </div>

        <div class="mb-3">
          <label for="mot_de_passe" class="form-label">Mot de passe</label>
          <input
            id="mot_de_passe"
            type="password"
            class="form-control"
            [class.is-invalid]="form.controls.mot_de_passe.invalid && form.controls.mot_de_passe.touched"
            formControlName="mot_de_passe"
          />
          @if (form.controls.mot_de_passe.invalid && form.controls.mot_de_passe.touched) {
            <div class="invalid-feedback">Mot de passe requis.</div>
          }
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger py-2" role="alert">{{ errorMessage }}</div>
        }

        <button type="submit" class="btn btn-dark w-100 mt-2">Se connecter</button>
      </form>

      <p class="text-center text-muted mt-4 mb-0">
        Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
