services:
  jenkins:
    build:
      context: ./jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_HOME: ${PWD}/jenkins/jenkins_home
      JAVA_OPTS: -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/jenkins/jenkins_home:${PWD}/jenkins/jenkins_home
      - .:/repo:ro
